<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="" https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body id="Container">
    <div id="menu">
        <fieldset>
            <h1>Mis Tareas</h1>
            <p>Organiza tu dia</p>
            <div id="m_Tareas"></div>
            <div id="m_pendientes"></div>
            <div id="m_completadas"></div>
            <div id="m_Calendario"></div>
            <div id="m_Estadisticas"></div>
            <div id="m_Ajustes"></div>
        </fieldset>
    </div>
    <div id="box1">
        <h1>Mis Tareas del Dia </h1>
        <p>Agrega, organiza y completa tus tareas diarias.</p>
        <fieldset>
            <h3>Agregar nueva Tarea</h3>
            <div>
                <div>
                    <p>Tarea</p>
                    <input type="text" id="Ingresar_tarea" placeholder="¿Que necesitas hacer?">
                </div>
                <div>
                    <p>Prioridad</p>
                    <select id="Prioridad">
                        <option value="baja">Baja</option>
                        <option value="media">Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
                <div>
                    <P>Fecha</P>
                    <input type="date" id="Fecha">
                </div>
                <div>
                    <button id="Agregar"> + Agregar Tarea</button>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <div class="filters">
                <span>Filtrar tareas:</span>
                <button>Todas</button>
                <button>Pendientes</button>
                <button>Completadas</button>
            </div>


            <div class="summary">
                <div>
                    <fieldset>Total: <span>5</span></fieldset>
                </div>

                <fieldset>
                    <div>Pendientes: <span>3</span></div>
                </fieldset>
                <fieldset>
                    <div>Completadas: <span>2</span></div>
                </fieldset>
            </div>
        </fieldset>

        <fieldset>
            <h2>Listar Tareas</h2>
            <div>


            </div>
        </fieldset>

        <div class="footer">
            <p>© 2024 Mis Tareas del Día | Hecho por Estudiante Web</p>
        </div>

    </div>
</body>
<script src="js/script.js"></script>

</html>
